name = "kanvis-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-25"
compatibility_flags = ["nodejs_compat"]

# KV namespace for proxied-page cache (ARCH-1, PERF-4).
# Uncomment after running: wrangler kv:namespace create kanvis_cache
# [[kv_namespaces]]
# binding = "KANVIS_CACHE"
# id = "FILL_IN_AFTER_CREATE"

[vars]
EDITOR_SCRIPT_URL = "https://kanvis.app/static/editor.js"
PROXY_FETCH_TIMEOUT_MS = "5000"
PROXY_MAX_BYTES = "5000000"
